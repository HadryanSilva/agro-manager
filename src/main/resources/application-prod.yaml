spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:agro_manager}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            # URI registrado no Google Console: {FRONTEND_URL}/api/login/oauth2/code/google
            # O Nginx remove o prefixo /api antes de encaminhar ao backend
            redirect-uri: "${FRONTEND_URL}/api/login/oauth2/code/google"

server:
  # Necessário para que o Spring resolva corretamente as URLs atrás do Nginx
  # e gere os redirect URIs do OAuth2 com o domínio público correto
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 900000
    refresh-expiration: 604800000
  cors:
    allowed-origins: ${FRONTEND_URL}
  frontend-url: ${FRONTEND_URL}