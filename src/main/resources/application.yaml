spring:
  application:
    name: agro-manager
  profiles:
    # Default to 'dev' when no profile is explicitly set. Override in production
    # with SPRING_PROFILES_ACTIVE=prod.
    default: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Common migrations + vendor-specific ones. Spring Boot resolves the
    # {vendor} placeholder to 'h2' or 'postgresql' at runtime.
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/{vendor}
  web:
    error:
      include-message: always
      include-binding-errors: always

logging:
  level:
    br.com.hadryan.agro.manager: INFO
