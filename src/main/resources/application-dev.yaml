spring:
  datasource:
    # In-memory H2 that survives until the JVM stops. MODE=PostgreSQL keeps
    # SQL dialect closer to production so migrations behave similarly.
    url: jdbc:h2:mem:agromanager;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate only validates mappings match it.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    br.com.hadryan.agro.manager: DEBUG
    org.hibernate.SQL: DEBUG