spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agro_manager
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  jwt:
    # Mínimo 32 caracteres para HS256 — trocar em produção
    secret: ${JWT_SECRET:dev-only-secret-key-do-not-use-in-production!!}
    expiration: 900000        # 15 minutos em ms
    refresh-expiration: 604800000  # 7 dias em ms
  cors:
    allowed-origins: http://localhost:5173
  frontend-url: http://localhost:5173