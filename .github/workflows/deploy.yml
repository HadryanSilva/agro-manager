name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de destino'
        required: true
        default: 'production'
        type: choice
        options: [production]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy em produção
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Verificar build recente do backend
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              branch: 'main',
              status: 'success',
              per_page: 1,
            });
            if (runs.data.total_count === 0) {
              core.setFailed('Nenhum build bem-sucedido do backend encontrado na main.');
            }

      - name: Verificar build recente do frontend
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FRONTEND_REPO_TOKEN }}
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: '${{ secrets.FRONTEND_REPO_NAME }}',
              workflow_id: 'build.yml',
              branch: 'main',
              status: 'success',
              per_page: 1,
            });
            if (runs.data.total_count === 0) {
              core.setFailed('Nenhum build bem-sucedido do frontend encontrado na main.');
            }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "==> Acessando diretório do projeto..."
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Autenticando no GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "==> Baixando imagens mais recentes..."
            docker compose -f docker-compose.prod.yml pull

            echo "==> Aplicando deploy..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Removendo imagens antigas..."
            docker image prune -f

            echo "==> Status dos containers:"
            docker compose -f docker-compose.prod.yml ps

      - name: Resultado
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy realizado com sucesso em $(date '+%d/%m/%Y %H:%M:%S')"
          else
            echo "❌ Deploy falhou. Verifique os logs acima."
          fi